<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Checklist</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #00d4ff; border-bottom: 2px solid #333; padding-bottom: 10px; }
        ol { list-style: none; padding: 0; }
        li { 
            background: #2a2a2a; 
            margin: 10px 0; 
            padding: 15px; 
            border-left: 4px solid #00d4ff; 
            border-radius: 4px;
        }
        li::before {
            content: counter(li) ". ";
            counter-increment: li;
            font-weight: bold;
            color: #00d4ff;
            margin-right: 10px;
        }
        ol { counter-reset: li; }
    </style>
</head>
<body>
    <div class="container">
        <h1>College Checklist</h1>
        <ol>
            <li>10th Class Memorandum of Marks</li>
            <li>12th Class Memorandum of Marks</li>
            <li>Bonafide Certificate 1</li>
            <li>Bonafide Certificate 2</li>
            <li>Bonafide Certificate 3</li>
            <li>Caste Certificate</li>
            <li>Income Certificate</li>
            <li>Transfer Certificate (12th Class)</li>
            <li>Bank Passbook</li>
            <li>ATM Card</li>
        </ol>
    </div>
</body>
</html>
